<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        background-color: darkred;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      #canvas {
        border: 0px none;
        background-color: black;
        /* Remove fixed width/height and use max-constraints */
        max-width: 100%;
        max-height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
      var Module = {
        canvas: (function () {
          var canvas = document.getElementById("canvas");
          return canvas;
        })(),
        print: (text) => console.log(text),
        setStatus: (text) => console.log(text),
        preRun: [
          function () {
            if (Module.canvas) {
              Module.canvas.width = 854; // Example 480p width
              Module.canvas.height = 480; // Example 480p height
            }
          },
        ],
      };
    </script>
    <script src="a.out.js"></script>
  </body>
</html>
